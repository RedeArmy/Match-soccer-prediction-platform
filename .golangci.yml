version: "2"

# golangci-lint configuration for world-cup-quiniela.
#
# Run locally: make lint
# CI enforces the same configuration via golangci/golangci-lint-action.
#
# Philosophy: prefer a small set of high-signal linters over an exhaustive
# list. Every enabled linter must earn its place by catching real bugs or
# enforcing a style rule that genuinely matters for this codebase.

linters:
  # Disable the default set and opt in explicitly so that linter upgrades
  # do not silently introduce new failures on existing code.
  default: none
  enable:
    - errcheck        # unhandled errors (the #1 Go bug category)
    - govet           # suspicious constructs (shadow, printf format, etc.)
    - ineffassign     # assignments whose result is never used
    - staticcheck     # comprehensive static analysis (includes gosimple in v2)
    - unused          # exported and unexported identifiers never referenced
    - bodyclose       # http response bodies that are never closed
    - noctx           # http requests created without a context
    - revive          # opinionated but configurable style linter
    - exhaustive      # switch exhaustiveness on named enum types — catches missing
                      # cases when a new EventType or Status constant is added
    - gosec           # security: integer overflows, weak crypto, path injection
    - gocritic        # style correctness: unlambda, singleCaseSwitch, exitAfterDefer
    - wrapcheck       # errors from external packages must be wrapped for stack traces
    - gocognit        # cognitive complexity ceiling (catches the same class as SonarQube)

  settings:
    revive:
      rules:
        - name: exported
          severity: warning
        - name: error-return
          severity: warning
        - name: error-strings
          severity: warning
        - name: increment-decrement
          severity: warning

    errcheck:
      # Ignore errors from fmt.Fprintf (write to http.ResponseWriter cannot
      # fail in practice — the connection is already established) and
      # (*zap.Logger).Sync (best-effort flush on shutdown).
      exclude-functions:
        - fmt.Fprintf
        - (*go.uber.org/zap.Logger).Sync

    exhaustive:
      # A switch that contains a `default:` branch is always considered exhaustive.
      # This lets partial-dispatch switches (e.g. the admin email template builder,
      # which intentionally handles only a subset of EventType and falls back to a
      # generic layout) pass without listing every constant.
      default-signifies-exhaustive: true

    gosec:
      # G115 (integer overflow int→int32) is suppressed globally because every
      # conversion in this codebase is guarded by system-param range bounds or
      # config validation. Individual call sites document this with //nolint comments.
      excludes:
        - G115

    gocritic:
      # Enable only the checks that have proven high signal for this codebase.
      # "exitAfterDefer" catches the common TestMain anti-pattern where os.Exit
      # skips deferred cleanup. "unlambda" removes useless wrapper lambdas.
      # "singleCaseSwitch" enforces `if` over one-case switches.
      enabled-checks:
        - exitAfterDefer
        - unlambda
        - singleCaseSwitch

    gocognit:
      # 20 is a reasonable ceiling for production Go code: it allows moderately
      # complex functions while still catching functions that SonarQube would flag.
      min-complexity: 20

  exclusions:
    rules:
      # Test files: relax errcheck, unused, noctx, gosec, and wrapcheck — test
      # helpers often ignore errors, use hardcoded secrets, and call os.Setenv
      # without checking its error (which can only fail when the env var name
      # contains '=' or '\0', neither of which appears in any test).
      - path: "_test\\.go"
        linters:
          - errcheck
          - unused
          - noctx
          - gosec
          - wrapcheck

      # Repository and service files implement interfaces; per-method
      # comments on private receivers are redundant noise.
      - path: "internal/(repository|service|middleware)/"
        linters:
          - revive

      # cmd/genschema is a dev-only code-generation tool run in CI with
      # controlled inputs. File path and permission issues are non-issues there.
      - path: "cmd/genschema/"
        linters:
          - gosec

      # Internal module interface errors carry context from the implementation
      # that returned them; a second fmt.Errorf wrap at the call site adds
      # nothing but noise. Only external-package errors (pgx, strconv, io/fs)
      # at true application-layer boundaries need wrapping.
      - text: "github.com/rede/world-cup-quiniela/"
        linters:
          - wrapcheck

      # ResponseWriter.Write errors cannot meaningfully be wrapped in decorator
      # types that must satisfy the http.ResponseWriter interface contract —
      # callers cannot inspect a wrapped error from Write() and the connection
      # is already established, so the error is unrecoverable regardless.
      - text: "func \\(net/http\\.ResponseWriter\\)\\.Write"
        linters:
          - wrapcheck

      # Infrastructure adapters (database migrations, cache, messaging, email,
      # storage, leader election) are thin wrappers around external libraries.
      # Wrapping every pgx/redis/io/fs error at this layer adds no caller-
      # relevant context; the external error message already identifies the site.
      - path: "internal/infrastructure/"
        linters:
          - wrapcheck

      # pkg/ holds internal library utilities (breaker, idempotency, logger).
      # Each wraps a single external dependency; adding fmt.Errorf around every
      # call would double-wrap every error that bubbles up through the stack.
      - path: "pkg/"
        linters:
          - wrapcheck

      # Repository files call pgx directly to implement the data-access layer.
      # Errors returned from pgx are implementation details; the service layer
      # adds domain context when it matters. Wrapping every rows.Scan or
      # pool.QueryRow call is mechanical noise with no diagnostic value.
      - path: "internal/repository/"
        linters:
          - wrapcheck

      # Notification infrastructure uses internal interfaces (SSE hub, outbox
      # writer, dispatcher chain) whose errors already carry context.
      - path: "internal/notification/"
        linters:
          - wrapcheck

    # Generated Swagger docs should not be linted.
    paths:
      - "docs/"

formatters:
  enable:
    - gofmt           # formatting must match gofmt output
    - goimports       # import ordering and grouping

  settings:
    goimports:
      # Enforce three import groups: stdlib / external / internal.
      local-prefixes:
        - github.com/rede/world-cup-quiniela

  exclusions:
    paths:
      - "docs/"

issues:
  # Show all issues, not just the first 3 per linter.
  max-issues-per-linter: 0
  max-same-issues: 0
