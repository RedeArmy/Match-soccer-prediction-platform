# Fly.io configuration for the background worker.
#
# Prerequisites — run once before the first deploy:
#
#   1. Create the app
#          fly apps create wcq-worker
#
#   2. Set runtime secrets (worker needs DB + Redis; no Clerk, no CORS)
#          fly secrets set --app wcq-worker \
#            WCQ_DATABASE_DSN="<postgres-connection-string>" \
#            WCQ_REDIS_ADDR="<host>:<port>" \
#            WCQ_EVENTBUS_DRIVER="redis"
#
#   The same FLY_API_TOKEN used for wcq-api works here — it is scoped to
#   the Fly.io organisation, not to a single app.
#
# Update `app` below if you chose a different name than wcq-worker.

app            = 'wcq-worker'
primary_region = 'mia'

# The worker receives events from Redis pub/sub and has no user-facing HTTP
# traffic. [http_service] is used instead of [[services]] because [[services]]
# with protocol='tcp' does not reliably trigger [[services.http_checks]] probes
# across all Fly.io configurations — HTTP health checks require an HTTP-typed
# service block. auto_stop/auto_start are disabled so the machine runs
# continuously; min_machines_running = 1 prevents Fly from scaling to zero.
[http_service]
  internal_port        = 8081
  auto_stop_machines   = false
  auto_start_machines  = false
  min_machines_running = 1

  # Liveness check: if /health returns non-2xx for the grace + timeout period,
  # Fly will restart the machine automatically.
  [[http_service.checks]]
    interval     = '15s'
    timeout      = '10s'
    grace_period = '15s'
    method       = 'GET'
    path         = '/health'

# Memory and GC tuning for a 256 MB Fly.io machine:
#
# GOMEMLIMIT=230MiB  — hard ceiling at 89 % of physical RAM; the Go runtime GC
#                      will collect aggressively before the OS OOM-killer fires.
# GOGC=100           — default percentage-based trigger: collect when the live
#                      heap doubles. Combined with GOMEMLIMIT this gives
#                      predictable incremental GC under bursty scoring workloads
#                      (concurrent snapshot goroutines), avoiding the large pause
#                      spikes that occur when GOGC=off lets the heap grow freely
#                      until GOMEMLIMIT fires a single large cycle near the ceiling.
#                      Must be set explicitly — the Go default is also 100 when
#                      GOMEMLIMIT is set, but leaving it implicit risks a future
#                      operator copying GOGC=off from the API toml without
#                      realising the worker's tighter 256 MB budget. (TD-006)
# WCQ_DATABASE_MAXOPENCONNS=10 — caps the pgx pool at 10 instead of the 25-
#                      connection default. The worker runs at most 4 concurrent
#                      snapshot goroutines (DefaultWorkerSnapshotConcurrency) plus
#                      a handful of scoring connections; 25 idle connections would
#                      hold unnecessary pgx buffers against the 230 MiB budget.
[env]
  GOMEMLIMIT                = "230MiB"
  GOGC                      = "100"
  WCQ_DATABASE_MAXOPENCONNS = "10"

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
