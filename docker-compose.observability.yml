# docker-compose.observability.yml — Full observability stack for local development.
#
# Starts Prometheus, Grafana, Tempo, Alertmanager, n8n, and Jaeger alongside
# the core infrastructure defined in docker-compose.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Required environment variables (set in .env or shell):
#   WCQ_OBSERVABILITY_PROMETHEUSURL=http://prometheus:9090
#   WCQ_OBSERVABILITY_TEMPOURL=http://tempo:3200
#   WCQ_N8N_BASEURL=http://n8n:5678
#   WCQ_N8N_APIKEY=<n8n API key from n8n UI Settings → API Keys>
#   WCQ_N8N_WEBHOOKURL=http://n8n:5678/webhook
#
# Optional overrides:
#   GRAFANA_ADMIN_PASSWORD — Grafana admin password (default: admin)
#   N8N_ENCRYPTION_KEY     — n8n encryption key for stored credentials
#   N8N_BASIC_AUTH_USER    — n8n UI basic-auth username (default: admin)
#   N8N_BASIC_AUTH_PASS    — n8n UI basic-auth password (default: changeme)

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - quiniela_net
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - quiniela_net
    depends_on:
      - prometheus
      - tempo

  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "127.0.0.1:3200:3200"   # Tempo HTTP API
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - quiniela_net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - quiniela_net

  n8n:
    image: n8nio/n8n:1.49.0
    restart: unless-stopped
    environment:
      DB_TYPE: sqlite
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASS:-changeme}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-dev-encryption-key-change-in-prod}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      EXECUTIONS_PROCESS: main
      N8N_LOG_LEVEL: info
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - quiniela_net

  jaeger:
    image: jaegertracing/all-in-one:1.58
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # Jaeger UI
      - "127.0.0.1:14268:14268"  # Jaeger HTTP collector
    networks:
      - quiniela_net

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local
  alertmanager_data:
    driver: local
  n8n_data:
    driver: local

networks:
  quiniela_net:
    external: true
    name: world-cup-quiniela_quiniela_net
