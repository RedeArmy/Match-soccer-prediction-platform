# CI pipeline — quality gate for pull requests.
#
# Triggers on every PR targeting develop or main.
#
# Job graph:
#   guard  →  trivy        (filesystem: Go module CVEs + gitleaks secrets)
#          ↘  trivy-image  (base image: alpine CVEs)
#          ↘  lint  →  test
#                   ↘  test-integration
#                   ↘  test-migrate-roundtrip
#                   ↘  benchmark
#
# guard:       enforces that only the develop branch may open a PR against main.
#              Any other source branch targeting main causes an immediate failure,
#              preventing accidental direct merges from feature branches.
#
# trivy:       filesystem vulnerability scan — checks Go module dependencies and
#              Dockerfiles for known CVEs before any build or test runs.  Uses
#              scan-type=fs so no Docker image build is required; exit-code=1 on
#              CRITICAL findings blocks the PR.  Also runs gitleaks to scan the
#              full git history for committed secrets.
#
# trivy-image: base-image CVE scan — scans the pinned alpine version used in
#              Dockerfile and Dockerfile.worker for OS-level vulnerabilities.
#              Runs in parallel with trivy for faster PR feedback.
#
# lint:    runs golangci-lint with the project's .golangci.yml configuration.
#          Fast feedback — fails before the slower integration test suite runs.
#
# test:    runs go vet, the full test suite with coverage, and SonarCloud.
#          Depends on lint so that style/error issues are caught before spinning
#          up testcontainers.
#
# test-integration: runs E2E tests tagged //go:build integration. These tests
#          spin up real containers (Postgres, Redis) via testcontainers-go and
#          exercise the full HTTP stack. Runs in parallel with test to keep
#          total wall-clock time close to the slower of the two.
#
# benchmark: runs each benchmark three times (count=3) and compares against
#          .bench/baseline.txt with benchstat. A statistically significant
#          regression blocks the PR; update the baseline with make bench-save.
#
# All jobs must be registered as required status checks in Branch Protection
# Rules for develop and main (see README or docs/branching.md).

name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  # --------------------------------------------------------------------------
  # Branch policy guard
  # --------------------------------------------------------------------------
  guard:
    name: Branch policy
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      # PRs to main are only permitted from develop. Any other source branch
      # (feature/*, hotfix/*, etc.) must be merged into develop first.
      # This step is a no-op for PRs targeting develop.
      - name: Verify source branch for PRs targeting main
        if: github.base_ref == 'main'
        # HEAD_REF is assigned from the GitHub expression before entering the
        # shell script. This prevents script injection: an attacker-controlled
        # branch name with shell metacharacters is never interpolated directly
        # into the run block — it is treated as a plain string by the shell.
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_REF" != "develop" ]; then
            echo "::error::Only the develop branch may be merged into main."
            echo "::error::Source branch detected: $HEAD_REF"
            echo "::error::Merge your changes into develop first, then open a PR from develop → main."
            exit 1
          fi

  # --------------------------------------------------------------------------
  # Vulnerability scan — runs in parallel with lint for faster PR feedback.
  # scan-type=fs checks Go module dependencies (go.sum) and Dockerfiles for
  # known CVEs without building a Docker image.  The deploy pipeline adds a
  # second scan at the image level once the image is built and pushed.
  # --------------------------------------------------------------------------
  trivy:
    name: Security scan (CVEs + secrets)
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history required by gitleaks to scan the complete commit log.
          fetch-depth: 0

      # Scans Go module dependencies (go.sum) and Dockerfiles for known CVEs.
      # scan-type=fs avoids a Docker image build — the deploy pipeline adds a
      # second scan at the built-image level.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      # Scans the full git history and the working tree for secrets (API keys,
      # passwords, private keys).  Uses .gitleaks.toml to suppress known-safe
      # false positives (placeholder tokens in .env.example, synthetic keys in
      # _test.go files).
      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # Lint — fast static analysis before the slower test suite
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false # golangci-lint manages its own cache

      # Uses .golangci.yml in the repository root.
      # The version is pinned so that linter upgrades are a deliberate choice,
      # not a silent change on the next PR.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m

  # --------------------------------------------------------------------------
  # Vet, test and SonarCloud analysis
  # --------------------------------------------------------------------------
  test:
    name: Vet, Test & SonarCloud
    runs-on: ubuntu-latest
    needs: [guard, lint]
    permissions:
      contents: read
      pull-requests: read

    steps:
      # fetch-depth: 0 is required by SonarCloud to attribute coverage data
      # to the correct commit author via git blame.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Pre-populate the module cache so that swag's internal go list call
      # (triggered by --parseDependency) finds all packages already downloaded.
      # Without this, go list runs under -mod=readonly and fails on a cold cache.
      - name: Download module dependencies
        run: go mod download

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag

      # Regenerates docs/ and fails if the committed spec differs from what
      # the annotations produce. Prevents stale docs from reaching main.
      - name: Verify Swagger docs are up to date
        run: |
          make swagger-gen
          git diff --exit-code docs/

      - name: Vet
        run: go vet ./...

      # govulncheck scans the module's dependency graph for known CVEs.
      # The tool is declared in go.mod (tool directive) and verified via
      # go.sum — no network install needed at runtime.
      #
      # Scope: production and validation packages only. cmd/genschema and
      # internal/testutil are intentionally excluded: they pull in
      # github.com/docker/docker (via testcontainers-go) which carries CVEs
      # with no upstream fix available (GO-2026-4883, GO-2026-4887). Neither
      # package is part of any deployable binary.
      - name: Vulnerability scan
        run: |
          go tool govulncheck \
            ./internal/api/... \
            ./internal/domain/... \
            ./internal/infrastructure/... \
            ./internal/middleware/... \
            ./internal/notification/... \
            ./internal/observability/... \
            ./internal/repository/... \
            ./internal/service/... \
            ./pkg/... \
            ./cmd/api/... \
            ./cmd/worker/... \
            ./cmd/migrate/... \
            ./cmd/validate-params/... \
            ./cmd/vapid-keygen/...

      # Produces coverage.out in the workspace root.
      # SonarCloud reads this file directly via sonar.go.coverage.reportPaths.
      - name: Test with coverage
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: make test-cover

      # Fallback coverage gate — runs before SonarCloud so a coverage drop is
      # caught immediately, even when sonarcloud.io is unavailable.  Fails the
      # build if total coverage falls below MIN_COVERAGE (default 70 %).
      # Threshold is documented in sonar-project.properties (Quality Gate runbook).
      - name: Check minimum coverage
        run: make check-coverage

      # Per-package gate for the service layer (business logic).
      # internal/repository/ is excluded — its tests use testcontainers (326 s)
      # and run in the test-integration job instead.
      - name: Check service coverage
        run: make check-coverage-service

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838 # v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}

  # --------------------------------------------------------------------------
  # Integration tests — E2E suite tagged //go:build integration
  # --------------------------------------------------------------------------
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [guard, lint]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Ryuk is the testcontainers reaper container; it is disabled here because
      # GitHub Actions runners do not support Docker socket remounting, which
      # Ryuk requires for container cleanup. Containers are still cleaned up by
      # the runner when the job exits.
      - name: Integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: make test-integration

  # --------------------------------------------------------------------------
  # Base-image CVE scan — detects known vulnerabilities in the alpine base
  # image before they reach the deploy pipeline. Only fails on CRITICAL
  # severity with available fixes; unfixed CVEs are informational only.
  # Uses the same alpine version pinned in Dockerfile and Dockerfile.worker.
  # Runs in parallel with the filesystem trivy job for faster PR feedback.
  # --------------------------------------------------------------------------
  trivy-image:
    name: CVE scan (base image)
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan alpine base image for CVEs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: alpine:3.22
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  # --------------------------------------------------------------------------
  # Validate n8n workflow JSON — prevents malformed files from breaking the
  # n8n instance on startup. Does not test workflow execution.
  # --------------------------------------------------------------------------
  validate-n8n:
    name: Validate n8n workflows
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate workflow JSON
        run: |
          fail=0
          for f in observability/n8n/workflows/*.json; do
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON in n8n workflow: $f"
              fail=1
            fi
          done
          exit $fail

  # --------------------------------------------------------------------------
  # Migration roundtrip — CI gate for down migrations
  # --------------------------------------------------------------------------
  test-migrate-roundtrip:
    name: Migration roundtrip
    runs-on: ubuntu-latest
    needs: [guard, lint]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Runs the full migrate-up → migrate-down → migrate-up cycle.
      # Any broken .down.sql file (bad SQL, missing DROP, constraint violation)
      # causes this job to fail and blocks the PR before the schema reaches main.
      # The 5-minute timeout covers ~77 × 3 sequential migration operations
      # plus testcontainers startup overhead on a cold runner.
      - name: Migration roundtrip (up → down → up)
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: make test-migrate-roundtrip

  # --------------------------------------------------------------------------
  # Benchmark smoke + drift report — informational, never blocks the PR.
  #
  # benchstat compares the current run against .bench/baseline.txt and
  # publishes a delta table to the job summary.  It exits 0 regardless of
  # whether it detects a performance regression — the tool does not support
  # exit-code-based regression gating.  Engineers should review the summary
  # table and update the baseline with `make bench-save` if the change is
  # intentional.  No merge is blocked by this job.
  # --------------------------------------------------------------------------
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [guard, lint]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # count=3 gives benchstat enough samples to compute confidence intervals
      # and produce a meaningful delta table.  benchtime=1x keeps each iteration
      # fast (one function call); the wall-clock overhead is ~3× a single run,
      # well within the job's time budget.
      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=1x -count=3 -run='^$' \
            ./internal/notification/... \
            ./internal/service/... \
            ./internal/api/... \
          | tee /tmp/bench-current.txt

      # benchstat prints a delta table to the job summary.  If no baseline
      # exists yet, the step is skipped.  The step always exits 0 — benchstat
      # does not exit non-zero on detected regressions; the table is
      # informational only.  Update the baseline with `make bench-save`.
      - name: Drift report vs baseline
        run: |
          if [ ! -f .bench/baseline.txt ]; then
            echo "No baseline found — skipping drift report." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          go run golang.org/x/perf/cmd/benchstat .bench/baseline.txt /tmp/bench-current.txt \
            >> "$GITHUB_STEP_SUMMARY"
