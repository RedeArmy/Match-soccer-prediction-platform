# Deploy pipeline — production build triggered on merge to main.
#
# Runs only on direct pushes to main (i.e. when a PR from develop is merged).
# It does NOT run on PRs — the CI pipeline handles those.
#
# Job graph:
#   test  →  docker
#
# test:   re-runs the full test suite before building the image.
#         Production deployments must never skip the test gate, even when the
#         CI pipeline already passed on the PR — the merge commit is a new
#         artefact and must be verified independently.
#
# docker: builds the production Docker image and pushes it to the GitHub
#         Container Registry (ghcr.io). The image is tagged with both the
#         short commit SHA (immutable, for rollbacks) and `latest` (moving,
#         for convenience).
#
# Registry: ghcr.io/<owner>/<repo>
# No extra secrets are required — GITHUB_TOKEN has write access to the
# package registry for the same repository.

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # --------------------------------------------------------------------------
  # Test gate — must pass before the Docker image is built
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

  # --------------------------------------------------------------------------
  # Build and push Docker image to GitHub Container Registry
  # --------------------------------------------------------------------------
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test

    # packages: write is required to push images to ghcr.io.
    # contents: read is the minimum required to checkout the repository.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives two tags from the current commit:
      #   - short SHA (e.g. a1b2c3d) — immutable, used for rollbacks
      #   - latest                   — always points to the most recent build
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Buildx is required to use the GitHub Actions cache backend.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      # cache-from / cache-to use the GitHub Actions Cache API so that Docker
      # layer caches persist across workflow runs. The `go mod download` layer —
      # the slowest step in the multi-stage build — is reused on subsequent
      # runs as long as go.sum does not change, cutting build times by ~60%.
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
