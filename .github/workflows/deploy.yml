# Deploy pipeline — production build and deploy triggered on merge to main.
#
# Triggers:
#   pull_request → main : runs the test job only, satisfying the branch
#                         protection required status check "Test" so the PR
#                         can be merged. docker/deploy jobs are skipped.
#   push → main         : runs the full pipeline after the PR is merged.
#
# Job graph (push only):
#   test  →  docker  ──┐
#                       ├──  deploy
#         docker-worker ┘
#
# test:          re-runs the full test suite before building the image.
#                Production deployments must never skip the test gate, even
#                when the CI pipeline already passed on the PR — the merge
#                commit is a new artefact and must be verified independently.
#                Also runs on pull_request so the "Test" required status check
#                is satisfied and the PR can be merged.
#
# docker:        builds the API Docker image and pushes it to GHCR, tagged
#                with the short commit SHA (immutable) and `latest` (moving).
#                Skipped on pull_request events.
#
# docker-worker: builds the worker Docker image and pushes it to GHCR under
#                <repo>-worker, using the same tagging strategy.
#                Skipped on pull_request events.
#
# deploy:        deploys both images to Fly.io using a rolling strategy that
#                keeps at least one healthy machine serving traffic throughout
#                the update. Requires a FLY_API_TOKEN repository secret and
#                the wcq-api / wcq-worker Fly apps to be pre-provisioned
#                (see fly.toml and fly.worker.toml for setup instructions).
#                Skipped on pull_request events.
#
# Registry: ghcr.io/<owner>/<repo>
# No extra secrets are required for GHCR — GITHUB_TOKEN has write access to
# the package registry for the same repository.

name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # --------------------------------------------------------------------------
  # Test gate — must pass before the Docker image is built
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: make test

      - name: Integration tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: make test-integration

  # --------------------------------------------------------------------------
  # Build and push API Docker image to GitHub Container Registry
  # --------------------------------------------------------------------------
  docker:
    name: Build & Push API Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    # packages: write is required to push images to ghcr.io.
    # contents: read is the minimum required to checkout the repository.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives two tags from the current commit:
      #   - short SHA (e.g. a1b2c3d) — immutable, used for rollbacks
      #   - latest                   — always points to the most recent build
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      # Buildx is required to use the GitHub Actions cache backend.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # cache-from / cache-to use the GitHub Actions Cache API so that Docker
      # layer caches persist across workflow runs. The `go mod download` layer —
      # the slowest step in the multi-stage build — is reused on subsequent
      # runs as long as go.sum does not change, cutting build times by ~60%.
      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Build and push worker Docker image to GitHub Container Registry
  # --------------------------------------------------------------------------
  docker-worker:
    name: Build & Push Worker Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The worker image is pushed to <repo>-worker so it is distinct from the
      # API image while living in the same registry namespace.
      - name: Extract worker image metadata
        id: meta-worker
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}-worker
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push worker
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Deploy both images to Fly.io
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [docker, docker-worker]
    # Skip until Fly.io is provisioned. The `secrets` context is not
    # available in job-level `if` conditions, so a repository variable is
    # used as the deployment gate instead.
    # To activate: Settings → Variables → Actions → New variable:
    #   Name:  FLY_DEPLOY_ENABLED
    #   Value: true
    # Then add FLY_API_TOKEN under Settings → Secrets → Actions.
    if: github.event_name == 'push' && vars.FLY_DEPLOY_ENABLED == 'true'

    # Targeting the `production` environment enables GitHub's deployment
    # tracking (visible in the repository's Deployments sidebar) and allows
    # configuring a required-reviewers approval gate under
    # Settings → Environments → production if manual sign-off is ever needed.
    environment: production

    steps:
      # Compute the short SHA that was used to tag the images in the docker
      # and docker-worker jobs. docker/metadata-action uses the first 7
      # characters of GITHUB_SHA with `type=sha,format=short`.
      - name: Compute image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # flyctl is not pre-installed on ubuntu-latest; this action installs the
      # latest stable release and adds it to PATH.
      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master 2026-04-08

      # Deploy the API first. `--strategy rolling` keeps at least one healthy
      # machine serving traffic while the new version is being rolled out,
      # eliminating downtime. `--wait-timeout 300` aborts and marks the
      # deployment failed if Fly does not confirm health within 5 minutes.
      - name: Deploy API
        run: |
          flyctl deploy \
            --app wcq-api \
            --image ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.sha }} \
            --strategy rolling \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Deploy the worker after the API is healthy. The worker consumes events
      # that the API publishes, so updating the API first avoids a window where
      # the worker is processing an event schema that the new API has not yet
      # started producing.
      - name: Deploy worker
        run: |
          flyctl deploy \
            --app wcq-worker \
            --config fly.worker.toml \
            --image ghcr.io/${{ github.repository }}-worker:${{ steps.tag.outputs.sha }} \
            --strategy rolling \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
