---
# World Cup Quiniela — Operational alert rules
#
# Metric names (OTel → Prometheus bridge, dots → underscores):
#   outbox_dlq_depth                      Int64ObservableGauge
#   outbox_oldest_pending_age_seconds     Float64ObservableGauge
#   outbox_pending_events                 Int64ObservableGauge
#   circuit_breaker_state                 Float64ObservableGauge  (label: backend)
#   payment_processing_duration_seconds   Float64Histogram        (labels: provider, status)
#   http_server_request_duration_seconds  Float64Histogram        (labels: method, route, status_code)
#   notification_sse_dropped_total        Int64ObservableCounter
#   kyc_audit_event_drop_total            Int64Counter
#   prize_distribution_failures_total     Int64Counter
#
# Alertmanager routing (alertmanager.yml):
#   severity=critical, workflow=payment-error-escalation → n8n-payment-escalation
#   alertname =~ "WCQCircuitBreaker.*"                   → n8n-circuit-breaker
#   severity=critical (catch-all)                        → n8n-critical
#   everything else                                      → n8n-default

groups:

  # ---------------------------------------------------------------------------
  # DLQ depth
  #   The notification DLQ (notification_dlq table) holds dispatch entries that
  #   have exhausted retries.  A non-zero depth means notifications are being
  #   permanently lost unless the DLQ replay worker resolves them.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.dlq
    interval: 30s
    rules:

      - alert: WCQDLQDepthWarning
        expr: outbox_dlq_depth > 10
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqdlqdepthwarning--wcqdlqdepthcritical"
          summary: "Notification DLQ depth above 10"
          description: >
            outbox_dlq_depth is {{ $value | humanize }}, exceeding 10 for 5
            consecutive minutes.  The DLQ replay worker may be failing to
            re-inject entries into the dispatch pipeline.  Check worker logs
            and the notification_dlq table.

      - alert: WCQDLQDepthCritical
        expr: outbox_dlq_depth > 50
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqdlqdepthwarning--wcqdlqdepthcritical"
          summary: "Notification DLQ critical — permanent notification loss"
          description: >
            outbox_dlq_depth is {{ $value | humanize }}.  At this depth, user
            notifications (emails, push messages) are being permanently
            discarded.  Immediate investigation of the DLQ replay worker and
            the downstream email/push providers is required.

  # ---------------------------------------------------------------------------
  # Outbox processing lag
  #   outbox_oldest_pending_age_seconds is the age of the oldest due-but-unprocessed
  #   row.  A sustained lag means the worker is overloaded or the dispatch
  #   pipeline is blocked.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.outbox
    interval: 30s
    rules:

      - alert: WCQOutboxLagHigh
        expr: outbox_oldest_pending_age_seconds > 30
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqoutboxlaghigh--wcqoutboxlagcritical"
          summary: "Outbox processing lag above 30 s"
          description: >
            The oldest pending-due outbox entry is
            {{ $value | humanizeDuration }} old, exceeding the 30 s lag
            warning threshold.  The outbox worker may be overloaded or
            encountering repeated dispatch failures.

      - alert: WCQOutboxLagCritical
        expr: outbox_oldest_pending_age_seconds > 300
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqoutboxlaghigh--wcqoutboxlagcritical"
          summary: "Outbox processing lag above 5 min — notifications severely delayed"
          description: >
            The oldest pending outbox entry is {{ $value | humanizeDuration }}
            old.  User-facing notifications are significantly delayed.  Verify
            that the worker process is running and the database is reachable.

  # ---------------------------------------------------------------------------
  # Circuit breaker
  #   circuit_breaker_state: 0=closed, 1=open, 2=half-open.
  #   Alerts route to the dedicated n8n circuit-breaker workflow (see
  #   alertmanager.yml) so on-call can investigate without navigating through
  #   the generic alert relay.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.circuit_breaker
    interval: 30s
    rules:

      - alert: WCQCircuitBreakerOpen
        expr: circuit_breaker_state == 1
        for: 1m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqcircuitbreakeropen"
          summary: "Circuit breaker {{ $labels.backend }} open for > 60 s"
          description: >
            The {{ $labels.backend }} circuit breaker has remained open for
            over 60 seconds.  Calls to this backend are being rejected
            immediately.  Check the backend health and review error logs.  The
            breaker will attempt recovery after the configured cooldown period.

  # ---------------------------------------------------------------------------
  # Payment error rate
  #   Derives the error rate from the payment_processing_duration_seconds
  #   histogram (labels: provider, status).  The alert routes to the dedicated
  #   n8n payment-error-escalation workflow via the workflow label.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.payment
    interval: 30s
    rules:

      - alert: WCQPaymentErrorRateHigh
        expr: |
          (
            sum(rate(payment_processing_duration_seconds_count{status="failed"}[5m]))
            /
            sum(rate(payment_processing_duration_seconds_count[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
          team: platform
          workflow: payment-error-escalation
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqpaymenterrorratehigh"
          summary: "Payment webhook error rate above 1 %"
          description: >
            {{ $value | humanizePercentage }} of payment webhook calls have
            failed over the last 5 minutes, exceeding the 1 % error rate SLO.
            Check the Recurrente/PayPal webhook handler logs and downstream
            service availability.

  # ---------------------------------------------------------------------------
  # HTTP 5xx error rate
  #   Fires on the global error rate (all routes combined).  Route-level
  #   breakdown is available in the Grafana SLO dashboard.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.http
    interval: 30s
    rules:

      - alert: WCQHTTP5xxRateHigh
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m]))
            /
            sum(rate(http_server_request_duration_seconds_count[5m]))
          ) > 0.005
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqhttp5xxratehigh"
          summary: "HTTP 5xx error rate above 0.5 %"
          description: >
            The 5-minute HTTP 5xx error rate is
            {{ $value | humanizePercentage }}, exceeding the 0.5 % threshold.
            Review server logs for recurring error patterns and check the
            per-route breakdown in the Grafana SLO dashboard.

  # ---------------------------------------------------------------------------
  # KYC audit event drops
  #   kyc_audit_event_drop_total counts compliance audit events that could not
  #   be persisted to kyc_events (e.g. after a primary domain write committed).
  #   Any drop is a compliance gap: a DB failure silently omitted part of the
  #   audit trail.  The alert fires immediately (for: 0m) to surface this fast.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.kyc
    interval: 30s
    rules:

      - alert: WCQKYCAuditEventDropped
        expr: increase(kyc_audit_event_drop_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqkycauditeventdropped"
          summary: "KYC audit event dropped — compliance trail gap"
          description: >
            {{ $value | humanize }} KYC audit event(s) failed to persist in the
            last 5 minutes.  A drop means a domain operation (submission,
            approval, freeze, etc.) committed without its corresponding
            kyc_events row.  Investigate DB errors in the KYC service logs and
            reconcile missing rows from application logs before the next
            regulatory review.

  # ---------------------------------------------------------------------------
  # Rate limiter degradation
  #   wcq_rate_limit_fail_open_total increments whenever the Redis-backed rate
  #   limiter falls back to fail-open due to a Redis connectivity error.  Any
  #   non-zero increase means rate limiting is degraded: limits are not shared
  #   across replicas and traffic may be under-throttled.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.rate_limit
    interval: 30s
    rules:

      - alert: WCQRateLimitDegraded
        expr: increase(wcq_rate_limit_fail_open_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqratelimitdegraded"
          summary: "Rate limiter degraded — Redis unavailable, failing open"
          description: >
            {{ $value | humanize }} rate-limit checks failed to reach Redis in the
            last 5 minutes.  The in-process fallback is active: per-replica limits
            apply but cross-replica enforcement is disabled.  Multi-replica
            deployments may be under-throttled.  Investigate Redis connectivity.

  # ---------------------------------------------------------------------------
  # Idempotency degradation
  #   wcq_idempotency_degraded_total increments whenever the Redis-backed
  #   idempotency store is unavailable and a write request is passed through
  #   without deduplication.  Any non-zero value on POST /withdrawals or
  #   /bank-transfers is a critical operational risk on multi-replica deployments.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.idempotency
    interval: 30s
    rules:

      - alert: WCQIdempotencyDegraded
        expr: increase(wcq_idempotency_degraded_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqidempotencydegraded"
          summary: "Idempotency middleware degraded — Redis unavailable"
          description: >
            {{ $value | humanize }} idempotency check(s) bypassed in the last 5
            minutes because the Redis store was unavailable.  POST /withdrawals and
            POST /bank-transfers may execute multiple times on concurrent requests
            across replicas.  Investigate Redis immediately and review recent
            withdrawal and bank-transfer activity for duplicates.

  # ---------------------------------------------------------------------------
  # SSE hub broadcast drops
  #   notification_sse_dropped_total counts events discarded because a client's
  #   buffer was full.  Any drop in a 1-minute window is an early warning that
  #   slow clients are falling behind.  For: 0m means the alert fires
  #   immediately on the first non-zero increase.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.sse
    interval: 30s
    rules:

      - alert: WCQSSEBroadcastDrops
        expr: increase(notification_sse_dropped_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqssebroadcastdrops"
          summary: "SSE broadcast drops detected in the last minute"
          description: >
            {{ $value | humanize }} SSE event(s) were dropped in the last
            minute due to full client buffers.  Slow or stalled SSE clients
            may be connected.  Monitor notification_sse_evicted_total to see
            whether the hub is evicting them automatically.

  # ---------------------------------------------------------------------------
  # Prize distribution failure
  #   prize_distribution_failures_total increments when DistributePrizes
  #   encounters a non-idempotency error from DistributePrizesAtomically.
  #   A non-zero count may indicate a partially credited prize pool: some
  #   winners were credited inside the transaction, but the transaction rolled
  #   back before all credits completed.  Requires manual reconciliation.
  # ---------------------------------------------------------------------------
  - name: wcq.alerts.prize
    interval: 30s
    rules:

      - alert: WCQPrizeDistributionFailed
        expr: increase(prize_distribution_failures_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          runbook_url: "https://github.com/RedeArmy/match-soccer-prediction-platform/blob/main/docs/runbook.md#wcqprizedistributionfailed"
          summary: "Prize distribution failed — manual reconciliation required"
          description: >
            {{ $value | humanize }} prize distribution attempt(s) failed in
            the last 5 minutes with a non-idempotency error.  The atomic
            transaction may have rolled back after prizes_distributed_at was
            stamped, leaving some winners without their credit.  Check the
            audit log (admin_group.prizes_distributed) and balance_ledger for
            the affected quiniela, and credit any missing amounts manually.

