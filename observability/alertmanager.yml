global:
  resolve_timeout: 5m
  # How long to wait before sending a resolved notification.
  http_config:
    follow_redirects: true

route:
  # Default receiver catches everything not matched by child routes.
  receiver: n8n-default
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  routes:
    # Payment error-rate alerts (WCQPaymentErrorRateHigh and SLO burn) route to
    # the dedicated payment-error-escalation n8n workflow, which pages on-call
    # and opens a Jira ticket.  Matched first so the workflow label takes
    # precedence over the generic severity=critical receiver.
    - matchers:
        - workflow = "payment-error-escalation"
      receiver: n8n-payment-escalation
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 30m

    # Circuit-breaker alerts route to a dedicated workflow (before the generic
    # critical receiver so they get the specialised n8n handler).
    - matchers:
        - alertname =~ "WCQCircuitBreaker.*"
      receiver: n8n-circuit-breaker
      group_wait: 15s
      group_interval: 2m
      repeat_interval: 30m

    # Remaining critical alerts get a higher-priority receiver with a shorter
    # repeat interval than the default.
    - matchers:
        - severity = "critical"
      receiver: n8n-critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h

receivers:
  - name: n8n-default
    webhook_configs:
      - url: "http://n8n:5678/webhook/prometheus-alert-relay"
        send_resolved: true
        http_config:
          bearer_token: ""
        max_alerts: 10

  - name: n8n-critical
    webhook_configs:
      - url: "http://n8n:5678/webhook/prometheus-alert-relay"
        send_resolved: true
        http_config:
          bearer_token: ""
        max_alerts: 5

  - name: n8n-payment-escalation
    webhook_configs:
      - url: "http://n8n:5678/webhook/payment-error-escalation"
        send_resolved: true
        http_config:
          bearer_token: ""
        max_alerts: 5

  - name: n8n-circuit-breaker
    webhook_configs:
      - url: "http://n8n:5678/webhook/circuit-breaker"
        send_resolved: true
        http_config:
          bearer_token: ""

inhibit_rules:
  # Silence warning alerts when a critical alert for the same alertname fires.
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname"]
