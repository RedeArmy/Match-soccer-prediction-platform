# SonarCloud project configuration for World Cup Quiniela.
#
# sonar.projectKey and sonar.organization are intentionally absent here.
# They are injected by the CI pipeline via -D flags using repository variables
# (SONAR_PROJECT_KEY, SONAR_ORGANIZATION), keeping this file environment-agnostic.

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------

# Analyse the entire module. SonarCloud uses sonar.exclusions to filter out
# non-production paths; there is no need to enumerate every source directory.
sonar.sources=.

# Exclude test files from the source analysis (they are covered separately
# via sonar.test.inclusions), along with generated, vendor, and non-Go paths
# that would skew metrics without contributing meaningful coverage data.
sonar.exclusions=\
  **/*_test.go,\
  **/vendor/**,\
  **/testdata/**,\
  **/fixtures/**,\
  migrations/**,\
  docs/**,\
  scripts/**,\
  internal/testutil/**

# Exclude binary entry points and startup infrastructure from coverage analysis.
# The main() functions in cmd packages are composition roots: they wire
# dependencies together, block on OS signals, and call os.Exit on errors.
# None of these behaviours can be exercised by Go's test runner without
# spawning a subprocess, and subprocess execution does not produce coverage
# profiles. The extracted run() / setupDB() helpers — which hold all the
# testable logic — are covered by integration tests in the same package.
# cmd/validate-params is a CLI validation tool; its business logic is fully
# tested in main_test.go (6 tests, 100% coverage of validation rules).
# setup.go files contain startup banners and configuration logging, invoked
# exclusively from main() during process initialisation. Testing these requires
# subprocess execution (os/exec) which does not contribute to coverage profiles.
sonar.coverage.exclusions=\
  cmd/api/main.go,\
  cmd/api/setup.go,\
  cmd/migrate/main.go,\
  cmd/worker/main.go,\
  cmd/worker/setup.go,\
  cmd/validate-params/main.go,\
  cmd/vapid-keygen/main.go,\
  internal/api/static/*.js

# Exclude cmd-layer setup files from copy-paste detection.
# Each binary (api, worker) has its own composition root that contains
# structurally parallel infrastructure bootstrap code (database pool
# construction, event bus wiring). This parallelism is inherent to the
# pattern — the two binaries share the same config schema and the same
# infrastructure packages — and is not accidental duplication. Extracting
# a shared helper would require a new internal package solely to host
# six lines of glue code, which is worse than the duplication it removes.
sonar.cpd.exclusions=cmd/**

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------

sonar.tests=.
sonar.test.inclusions=**/*_test.go

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------

# Go native coverage profile produced by `make test-cover`.
# SonarCloud reads this format directly; no conversion step is required.
sonar.go.coverage.reportPaths=coverage.out

# Block the CI step until the Quality Gate result is available.
# The coverage threshold is configured in the SonarCloud Quality Gate UI
# (sonarcloud.io → project → Quality Gates). Set a minimum of 70% overall
# coverage on new code. This property alone does not set the threshold; it
# ensures the CI step waits for and respects the gate result.
sonar.qualitygate.wait=true

# ---------------------------------------------------------------------------
# Issue suppressions
# ---------------------------------------------------------------------------

# docker:S6470 warns that "COPY . ." might copy sensitive files into the image.
# This is suppressed because a .dockerignore file in the repo root explicitly
# excludes .env files, key material, IDE directories, and build artefacts from
# the build context before Docker processes the COPY instruction.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6470
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Dockerfile*

# ---------------------------------------------------------------------------
# Encoding
# ---------------------------------------------------------------------------

sonar.sourceEncoding=UTF-8
