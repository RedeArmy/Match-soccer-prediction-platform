host: localhost:8080
info:
  contact: {}
  description: REST API for the World Cup prediction game. Manage fixtures, submit
    score forecasts, and track leaderboards.
  title: World Cup Quiniela API
  version: "1.0"
paths:
  /api/v1/admin/audit-log:
    get:
      description: Returns a paginated list of audit log entries. Supports filtering
      parameters:
      - description: Filter by actor (admin) user ID
        in: query
        name: actor_id
        type: integer
      - description: Filter by action string (e.g. admin_user.banned)
        in: query
        name: action
        type: string
      - description: Filter by resource type (e.g. membership, payment_record)
        in: query
        name: resource_type
        type: string
      - description: Filter by resource ID
        in: query
        name: resource_id
        type: integer
      - description: Max records per page (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.Paged-internal_api_handler_AuditLogResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List audit log entries
      tags:
      - admin-audit-log
  /api/v1/admin/audit-log/entity/{type}/{id}:
    get:
      description: Returns paginated audit log entries scoped to a single resource
      parameters:
      - description: Resource type (e.g. membership, payment_record, user)
        in: path
        name: type
        required: true
        type: string
      - description: Resource ID
        in: path
        name: id
        required: true
        type: integer
      - description: Max records per page (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.Paged-internal_api_handler_AuditLogResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Invalid resource ID
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List audit log by entity
      tags:
      - admin-audit-log
  /api/v1/admin/conflicts:
    get:
      description: Returns all currently detected operational inconsistencies that
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handler.ConflictResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List operational conflicts
      tags:
      - admin-conflicts
  /api/v1/admin/conflicts/{type}/{id}/resolve:
    post:
      consumes:
      - application/json
      description: Records an admin acknowledgement of the given conflict. This does
      parameters:
      - description: Conflict type (e.g. group_no_owner, orphaned_payment)
        in: path
        name: type
        required: true
        type: string
      - description: Entity ID affected by the conflict
        in: path
        name: id
        required: true
        type: integer
      - description: Optional resolution note
        in: body
        name: body
        schema:
          $ref: '#/definitions/internal_api_handler.resolveConflictRequest'
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "404":
          description: Conflict type or entity not found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Invalid entity ID or conflict type
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resolve a conflict
      tags:
      - admin-conflicts
  /api/v1/admin/dlq:
    delete:
      description: Permanently deletes all entries from all DLQ keys. Use with
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              removed:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Purge dead-letter queue
      tags:
      - admin-dlq
    get:
      description: Returns the count, oldest entry age, and a sample of messages for
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_rede_world-cup-quiniela_internal_service.DLQStat'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Dead-letter queue stats
      tags:
      - admin-dlq
  /api/v1/admin/dlq/replay:
    post:
      consumes:
      - application/json
      description: Re-enqueues up to limit entries from all DLQ keys back onto their
      parameters:
      - description: Optional replay limit (default 10)
        in: body
        name: body
        schema:
          $ref: '#/definitions/internal_api_handler.replayRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            properties:
              replayed:
                type: integer
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Replay dead-letter queue
      tags:
      - admin-dlq
  /api/v1/admin/groups/{id}:
    delete:
      description: Soft-deletes the quiniela group. All memberships and predictions
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not an admin
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "404":
          description: Group not found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Invalid group ID
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a group
      tags:
      - admin-groups
  /api/v1/admin/groups/{id}/leaderboard/history:
    get:
      description: Returns the most recent point-in-time leaderboard snapshots for
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Max snapshots to return (default/max from system_params)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
