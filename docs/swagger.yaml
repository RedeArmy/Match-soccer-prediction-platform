basePath: /
definitions:
  github_com_rede_world-cup-quiniela_pkg_health.Response:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/github_com_rede_world-cup-quiniela_pkg_health.Result'
        type: object
      status:
        type: string
    type: object
  github_com_rede_world-cup-quiniela_pkg_health.Result:
    properties:
      error:
        type: string
      latency_ms:
        type: integer
      status:
        type: string
    type: object
  internal_api_handler.CityResponse:
    properties:
      id:
        type: integer
      name:
        type: string
      state:
        $ref: '#/definitions/internal_api_handler.StateResponse'
    type: object
  internal_api_handler.CountryResponse:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  internal_api_handler.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internal_api_handler.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/internal_api_handler.ErrorDetail'
    type: object
  internal_api_handler.GroupResponse:
    properties:
      created_at:
        type: string
      currency:
        type: string
      entry_fee:
        type: integer
      id:
        type: integer
      invite_code:
        type: string
      invite_code_expires_at:
        description: nil means never expires
        type: string
      max_members:
        type: integer
      name:
        type: string
      owner_id:
        type: integer
      prize_threshold:
        type: integer
      updated_at:
        type: string
    type: object
  internal_api_handler.LeaderboardEntryResponse:
    properties:
      prize_winner:
        type: boolean
      rank:
        type: integer
      total_points:
        type: integer
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  internal_api_handler.LeaderboardResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/internal_api_handler.LeaderboardEntryResponse'
        type: array
      phase:
        description: empty string omitted for the overall leaderboard
        type: string
      quiniela_id:
        type: integer
    type: object
  internal_api_handler.MatchResponse:
    properties:
      away_score:
        type: integer
      away_team:
        type: string
      created_at:
        type: string
      home_score:
        type: integer
      home_team:
        type: string
      id:
        type: integer
      kickoff_at:
        type: string
      phase:
        type: string
      stadium:
        $ref: '#/definitions/internal_api_handler.StadiumResponse'
      stadium_id:
        type: integer
      status:
        type: string
      updated_at:
        type: string
    type: object
  internal_api_handler.MemberResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      joined_at:
        type: string
      paid:
        type: boolean
      quiniela_id:
        type: integer
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_api_handler.PredictionResponse:
    properties:
      away_score:
        type: integer
      created_at:
        type: string
      home_score:
        type: integer
      id:
        type: integer
      match_id:
        type: integer
      points:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  internal_api_handler.StadiumResponse:
    properties:
      capacity:
        type: integer
      city:
        $ref: '#/definitions/internal_api_handler.CityResponse'
      id:
        type: integer
      name:
        type: string
    type: object
  internal_api_handler.StateResponse:
    properties:
      code:
        type: string
      country:
        $ref: '#/definitions/internal_api_handler.CountryResponse'
      id:
        type: integer
      name:
        type: string
    type: object
  internal_api_handler.createGroupRequest:
    properties:
      currency:
        type: string
      entry_fee:
        type: integer
      max_members:
        type: integer
      name:
        type: string
      prize_threshold:
        description: optional; defaults to DefaultPrizeThreshold when 0
        type: integer
    type: object
  internal_api_handler.createMatchRequest:
    properties:
      away_team:
        type: string
      home_team:
        type: string
      kickoff_at:
        type: string
      phase:
        type: string
    type: object
  internal_api_handler.joinGroupRequest:
    properties:
      invite_code:
        type: string
    type: object
  internal_api_handler.submitPredictionRequest:
    properties:
      away_score:
        type: integer
      home_score:
        type: integer
      match_id:
        type: integer
    type: object
  internal_api_handler.updatePredictionRequest:
    properties:
      away_score:
        type: integer
      home_score:
        type: integer
    type: object
  internal_api_handler.updateResultRequest:
    properties:
      away_score:
        type: integer
      home_score:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for the World Cup prediction game. Manage fixtures, submit
    score forecasts, and track leaderboards.
  title: World Cup Quiniela API
  version: "1.0"
paths:
  /api/v1/groups:
    post:
      consumes:
      - application/json
      description: Creates a new prediction group. The caller becomes the owner
      parameters:
      - description: Group details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.createGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_handler.GroupResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "409":
          description: Group name already taken
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a group
      tags:
      - groups
  /api/v1/groups/{id}:
    get:
      description: Returns group metadata by ID.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.GroupResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a group
      tags:
      - groups
  /api/v1/groups/{id}/invite-code/rotate:
    post:
      description: Generates a new invite code for the group, immediately invalidating
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.GroupResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller is not the group owner
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Rotate invite code
      tags:
      - groups
  /api/v1/groups/{id}/leaderboard:
    get:
      description: Returns the ranked standings for a group. Pass ?phase=<value>
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Tournament phase filter
        in: query
        name: phase
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.LeaderboardResponse'
        "400":
          description: Unknown phase value
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Group leaderboard
      tags:
      - groups
  /api/v1/groups/{id}/members:
    get:
      description: Returns all memberships for the given group.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handler.MemberResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List group members
      tags:
      - groups
  /api/v1/groups/join:
    post:
      consumes:
      - application/json
      description: Joins the group identified by the invite code. The caller becomes
      parameters:
      - description: Invite code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.joinGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.MemberResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "404":
          description: Invite code not found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "409":
          description: Already a member or group is full
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a group
      tags:
      - groups
  /api/v1/groups/me:
    get:
      description: Returns all groups the authenticated user belongs to.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handler.MemberResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List my groups
      tags:
      - groups
  /api/v1/matches:
    get:
      description: Returns fixtures in the tournament schedule, optionally filtered
        by phase.
      parameters:
      - description: Tournament phase (group_stage, round_of_32, round_of_16, quarter_final,
          semi_final, third_place, final)
        in: query
        name: phase
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handler.MatchResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List matches
      tags:
      - matches
    post:
      consumes:
      - application/json
      description: Admin only. Creates a new fixture in the tournament schedule.
      parameters:
      - description: Match to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.createMatchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_handler.MatchResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a match
      tags:
      - matches
  /api/v1/matches/{id}:
    get:
      description: Returns a single fixture by ID.
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.MatchResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a match
      tags:
      - matches
    patch:
      consumes:
      - application/json
      description: Admin only. Sets the final score for a finished match.
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        type: integer
      - description: Final score
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.updateResultRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.MatchResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update match result
      tags:
      - matches
  /api/v1/matches/{id}/start:
    post:
      description: Admin only. Transitions a match from scheduled to live.
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.MatchResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Start a match
      tags:
      - matches
  /api/v1/predictions:
    get:
      description: Returns all predictions submitted by a specific user. The caller
      parameters:
      - description: Internal user ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: Scope results to this quiniela's active members
        in: query
        name: quiniela_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_handler.PredictionResponse'
            type: array
        "401":
          description: Missing or invalid auth token
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "403":
          description: Caller requested another user's predictions
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Missing or invalid user_id / quiniela_id
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List predictions by user
      tags:
      - predictions
    post:
      consumes:
      - application/json
      description: Submits a score forecast for a scheduled match. The user identity
      parameters:
      - description: Prediction
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.submitPredictionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_handler.PredictionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "409":
          description: Prediction already exists for this match
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Submit a prediction
      tags:
      - predictions
  /api/v1/predictions/{id}:
    patch:
      consumes:
      - application/json
      description: Updates the score forecast for an existing prediction. Only
      parameters:
      - description: Prediction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated scores
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.updatePredictionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_handler.PredictionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a prediction
      tags:
      - predictions
  /health:
    get:
      description: Liveness probe for load balancers and container orchestrators.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - infrastructure
  /health/ready:
    get:
      description: 'Readiness probe: runs all registered infrastructure checkers'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_rede_world-cup-quiniela_pkg_health.Response'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_rede_world-cup-quiniela_pkg_health.Response'
      summary: Readiness check
      tags:
      - infrastructure
  /webhooks/clerk:
    post:
      consumes:
      - application/json
      description: Receives and processes Clerk user lifecycle events (user.created,
        user.updated).
      produces:
      - application/json
      responses:
        "204":
          description: Event processed
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_handler.ErrorResponse'
      summary: Clerk webhook receiver
      tags:
      - webhooks
securityDefinitions:
  BearerAuth:
    description: 'Clerk JWT token. Format: "Bearer <token>"'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
